version: "3.9"

services:

  # ── FRAUD-X API server ────────────────────────────────────────────────────
  fraudx:
    build: .
    container_name: fraudx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRAUDX_JWT_SECRET=${FRAUDX_JWT_SECRET}
      - VT_API_KEY=${VT_API_KEY:-}
      - GSB_API_KEY=${GSB_API_KEY:-}
      - ABUSEIPDB_KEY=${ABUSEIPDB_KEY:-}
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - fraudx-models:/app/models
      - fraudx-db:/app/models/feedback.db
    depends_on:
      - kafka
    networks:
      - fraudx-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Kafka + Zookeeper (stream processing) ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraudx-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraudx-net
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraudx-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fraudx-net
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraudx-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx
      - NEXT_PUBLIC_WS_URL=ws://nginx/ws/alerts
    depends_on:
      - fraudx
    networks:
      - fraudx-net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fraudx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fraudx
      - frontend
    networks:
      - fraudx-net

  # ── Kafka UI (optional, dev/debug) ────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraudx-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraudx
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - fraudx-net
    profiles:
      - debug

networks:
  fraudx-net:
    driver: bridge

volumes:
  fraudx-models:
  fraudx-db:
  zk-data:
  zk-logs:
  kafka-data:
